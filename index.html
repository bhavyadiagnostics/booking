<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Doctor Prescription</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{font-family:Arial;background:#f2f2f2;padding:10px;}
input,textarea,select{width:100%;padding:8px;margin:5px 0;}
button{padding:10px;background:green;color:white;border:none;margin-top:10px;width:100%;}
#prescription{background:white;padding:20px;margin-top:20px;}
canvas{border:1px solid black;}
</style>
</head>

<body>

<h2>Doctor Prescription</h2>

Doctor Name
<input id="doctor_name">

Qualification
<input id="doctor_qualification">

Reg No
<input id="reg">

Clinic Address
<input id="clinic">

Doctor Mobile
<input id="doctor_mobile">

Date
<input id="date" type="date">

Prescription ID
<input id="prescription_id" readonly>

Patient Name
<input id="pname">

Age
<input id="age">

Gender
<select id="gender">
<option>Male</option>
<option>Female</option>
</select>

Patient Mobile
<input id="pmobile">

Symptoms
<textarea id="symptoms"></textarea>

Diagnosis
<textarea id="diagnosis"></textarea>

Medicine
<input id="med1">

Dose
<input id="dose1">

Frequency
<input id="freq1">

Duration
<input id="dur1">

Advice
<textarea id="advice"></textarea>

Followup Date
<input id="followup" type="date">

<h3>Doctor Signature</h3>
<canvas id="signature" width="300" height="100"></canvas>
<button onclick="clearSign()">Clear Signature</button>

<button onclick="generate()">Generate PDF</button>

<div id="prescription">

<h3 id="dname"></h3>
<p id="dqua"></p>
<p id="dreg"></p>
<p id="dclinic"></p>
<p id="rxid"></p>
<p id="ddate"></p>

<hr>

<h4>Patient Details</h4>
<p id="pdetails"></p>

<hr>

<h4>Symptoms</h4>
<p id="psym"></p>

<hr>

<h4>Diagnosis</h4>
<p id="pdiag"></p>

<hr>

<h4>Medicine</h4>
<p id="pmed"></p>

<hr>

<h4>Advice</h4>
<p id="padv"></p>

<img id="signimg" width="150">

</div>

<script>

// AUTO ID
function createPrescriptionID(){

let lastID=localStorage.getItem("rx");

if(lastID==null){lastID=0;}

lastID++;

localStorage.setItem("rx",lastID);

let today=new Date();
let m=String(today.getMonth()+1).padStart(2,'0');
let y=String(today.getFullYear()).slice(-2);

let id="RX-"+y+m+"-"+String(lastID).padStart(4,'0');

document.getElementById("prescription_id").value=id;

}

window.onload=createPrescriptionID;


// SIGNATURE PAD
let canvas=document.getElementById("signature");
let ctx=canvas.getContext("2d");
let drawing=false;

canvas.onmousedown=()=>drawing=true;
canvas.onmouseup=()=>drawing=false;
canvas.onmousemove=(e)=>{
if(!drawing)return;
ctx.lineWidth=2;
ctx.lineCap="round";
ctx.strokeStyle="black";
ctx.lineTo(e.offsetX,e.offsetY);
ctx.stroke();
ctx.beginPath();
ctx.moveTo(e.offsetX,e.offsetY);
}

function clearSign(){
ctx.clearRect(0,0,canvas.width,canvas.height);
}


// GENERATE PDF
function generate(){

document.getElementById("dname").innerHTML=document.getElementById("doctor_name").value;
document.getElementById("dqua").innerHTML=document.getElementById("doctor_qualification").value;
document.getElementById("dreg").innerHTML=document.getElementById("reg").value;
document.getElementById("dclinic").innerHTML=document.getElementById("clinic").value;
document.getElementById("rxid").innerHTML="Prescription ID : "+document.getElementById("prescription_id").value;
document.getElementById("ddate").innerHTML=document.getElementById("date").value;

document.getElementById("pdetails").innerHTML=document.getElementById("pname").value+" "+document.getElementById("age").value+" "+document.getElementById("gender").value;
document.getElementById("psym").innerHTML=document.getElementById("symptoms").value;
document.getElementById("pdiag").innerHTML=document.getElementById("diagnosis").value;
document.getElementById("pmed").innerHTML=document.getElementById("med1").value+" "+document.getElementById("dose1").value+" "+document.getElementById("freq1").value+" "+document.getElementById("dur1").value;
document.getElementById("padv").innerHTML=document.getElementById("advice").value;

let sign=canvas.toDataURL();
document.getElementById("signimg").src=sign;

html2canvas(document.getElementById("prescription")).then(canvas=>{

const img=canvas.toDataURL("image/png");
const {jsPDF}=window.jspdf;
const pdf=new jsPDF();
pdf.addImage(img,'PNG',0,0,210,297);
pdf.save("Prescription.pdf");

sendWhatsapp();

createPrescriptionID();

})

}


// WHATSAPP
function sendWhatsapp(){

let number=document.getElementById("pmobile").value;
let msg="Your Prescription is Ready";
let url="https://wa.me/91"+number+"?text="+msg;
window.open(url);

}

</script>

</body>
</html>
